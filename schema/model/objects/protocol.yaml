id: https://open-and-sustainable.github.io/revaise-model/schema/objects/protocol
name: revaise_protocol
description: "Protocol details for the review."
imports:
    - linkml:types
    - ./author

classes:
    Protocol:
        description: "Scoping and registration details of the review."
        slots:
            - registry
            - registration_id
            - registration_url
            - research_question
            - eligibility_criteria
            - picos
            - protocol_start_date
            - amendments
        slot_usage:
            amendments:
                range: Amendment
                multivalued: true
                inlined_as_list: true
                description: "Amendments to the protocol"

    Amendment:
        description: "A documented change or clarification to a review protocol."
        slots:
            - amendment_id
            - amendment_date
            - amendment_type
            - amendment_reason
            - amendment_description
            - affected_sections
            - amendment_author
            - approval_status
            - approval_date
            - approver
        slot_usage:
            amendment_id:
                identifier: true
                required: true
                description: "Unique identifier for this amendment"
            amendment_date:
                range: datetime
                required: true
                description: "Date of the amendment"
            amendment_type:
                range: AmendmentType
                required: true
                description: "Type of amendment"
            amendment_reason:
                range: string
                required: true
                description: "Human-readable reason for the amendment"
            amendment_description:
                range: string
                required: true
                description: "Detailed description of what was changed"
            affected_sections:
                range: string
                multivalued: true
                description: "Sections of the protocol affected by this amendment"
            amendment_author:
                range: Author
                description: "Author who made the amendment"
            approval_status:
                range: ApprovalStatus
                description: "Approval status of the amendment"
            approval_date:
                range: datetime
                description: "Date the amendment was approved"
            approver:
                range: string
                description: "Person or entity who approved the amendment"

slots:
    registry:
        range: string
        description: "Registry where the protocol is recorded"
    registration_id:
        range: string
        description: "Identifier assigned by the registry"
    registration_url:
        range: uri
        description: "URL to the registry entry"
    research_question:
        range: string
        description: "Primary research question"
    eligibility_criteria:
        range: string
        description: "Inclusion and exclusion criteria"
    picos:
        range: string
        description: "Population, Intervention, Comparison, Outcomes, Study design details"
    protocol_start_date:
        range: date
        description: "Protocol registration date"
    amendments:
        range: Amendment
        multivalued: true
        description: "Amendments to the protocol"
    amendment_id:
        range: string
        description: "Unique identifier for the amendment"
    amendment_date:
        range: datetime
        description: "Date when amendment was made"
    amendment_type:
        range: AmendmentType
        description: "Type of amendment"
    amendment_reason:
        range: string
        description: "Reason for making the amendment"
    amendment_description:
        range: string
        description: "Detailed description of the amendment"
    affected_sections:
        range: string
        multivalued: true
        description: "Protocol sections affected by this amendment"
    amendment_author:
        range: Author
        description: "Author who made the amendment"
    approval_status:
        range: ApprovalStatus
        description: "Approval status of the amendment"
    approval_date:
        range: datetime
        description: "Date when amendment was approved"
    approver:
        range: string
        description: "Person who approved the amendment"

enums:
    AmendmentType:
        description: "Types of amendments to a protocol"
        permissible_values:
            CLARIFICATION:
                description: "Clarification of existing content"
            CORRECTION:
                description: "Correction of errors"
            PROTOCOL_CHANGE:
                description: "Change to the protocol"
            SCOPE_CHANGE:
                description: "Change in review scope"
            METHODOLOGY_CHANGE:
                description: "Change in methodology"
            TIMELINE_CHANGE:
                description: "Change in timeline"
            TEAM_CHANGE:
                description: "Change in review team"
            ADMINISTRATIVE:
                description: "Administrative update"

    ApprovalStatus:
        description: "Approval status for amendments"
        permissible_values:
            PENDING:
                description: "Pending approval"
            APPROVED:
                description: "Approved"
            REJECTED:
                description: "Rejected"
            NOT_REQUIRED:
                description: "Approval not required"
