name: Publish Protocol

# Protocol releases, versioned independently of the data model (which is on Read the Docs).
# Source tag format: <protocol-name>-<MAJOR>.<MINOR>.<PATCH>   e.g. prisma-2020-1.0.0
# (No 'v' prefix — matches this repo's tagging convention. Data-model tags like 0.7.0 have
#  no '-' and never match this pattern.)
on:
    push:
        tags:
            - "*-*.*.*"

permissions:
    contents: write

concurrency:
    group: gh-pages
    cancel-in-progress: false

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: actions/setup-python@v5
              with:
                  python-version: '3.12'

            - name: Install MkDocs
              run: pip install mkdocs-material pymdown-extensions pygments

            - name: Build protocol site
              run: ./scripts/build_protocols.sh site_protocols

            # Deploy to gh-pages and tag the deployed commit so each deployed snapshot
            # is reachable by tag (e.g. gh-pages/prisma-2020-1.0.0).
            - name: Deploy + tag gh-pages
              uses: peaceiris/actions-gh-pages@v4
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_dir: ./site_protocols
                  tag_name: gh-pages/${{ github.ref_name }}
                  tag_message: "Deployed ${{ github.ref_name }}"
